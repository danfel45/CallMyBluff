<!-- Selected Player's Hand at the top -->
<div class="your-hand">
  <h3>Your Hand</h3>
  <div class="card-container">
    <div *ngFor="let card of selectedHandCards" class="card">
      <span class="rank">{{ card.rank }}</span>
      <span class="suit" [ngClass]="{
        'red-suit': card.suit === 'Hearts' || card.suit === 'Diamonds',
        'black-suit': card.suit === 'Clubs' || card.suit === 'Spades'
      }">
        <!-- Render suit symbols based on the card's suit -->
        <span *ngIf="card.suit === 'Hearts'">♥</span>
        <span *ngIf="card.suit === 'Diamonds'">♦</span>
        <span *ngIf="card.suit === 'Clubs'">♣</span>
        <span *ngIf="card.suit === 'Spades'">♠</span>
      </span>
    </div>
  </div>
  
</div>

<!-- Selected River Cards -->
<div class="river">
  <h3>River</h3>
  <div class="card-container">
    <div *ngFor="let card of selectedRiverCards" class="card">
      <span class="rank">{{ card.rank }}</span>
      <span class="suit" [ngClass]="{
        'red-suit': card.suit === 'Hearts' || card.suit === 'Diamonds',
        'black-suit': card.suit === 'Clubs' || card.suit === 'Spades'
      }">
        <!-- Render suit symbols based on the card's suit -->
        <span *ngIf="card.suit === 'Hearts'">♥</span>
        <span *ngIf="card.suit === 'Diamonds'">♦</span>
        <span *ngIf="card.suit === 'Clubs'">♣</span>
        <span *ngIf="card.suit === 'Spades'">♠</span>
      </span>
    </div>
  </div>
 
</div>

<!-- Card Deck Below the Selected Cards -->
<div class="deck">
  <div 
    *ngFor="let card of cards" 
    class="card" 
    [class.selected]="card.selected"
    (click)="toggleCardSelection(card)">
    
    <span class="rank">{{ card.rank }}</span>
    
    <span class="suit" [ngClass]="{
          'red-suit': card.suit === 'Hearts' || card.suit === 'Diamonds',
          'black-suit': card.suit === 'Clubs' || card.suit === 'Spades'
        }">
      <span *ngIf="card.suit === 'Hearts'">♥</span>
      <span *ngIf="card.suit === 'Diamonds'">♦</span>
      <span *ngIf="card.suit === 'Clubs'">♣</span>
      <span *ngIf="card.suit === 'Spades'">♠</span>
    </span>
  </div>
</div>
